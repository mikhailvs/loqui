<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>loqui — voice tutor</title><style>
:root{color-scheme:dark}*{box-sizing:border-box}
body{margin:0;background:#0d0f12;color:#e9edf2;font:16px/1.5 -apple-system,system-ui,sans-serif;
 display:flex;flex-direction:column;height:100dvh}
header{padding:12px 16px;background:#15181d;border-bottom:1px solid #262a30}
h1{font-size:16px;margin:0}.prog{font-size:12px;color:#8a929c;margin-top:2px}
#log{flex:1;overflow-y:auto;padding:14px 14px 4px}
.msg{margin:0 0 14px;max-width:90%}
.tutor .disp{background:#1b2330;border:1px solid #29384d;border-radius:14px 14px 14px 4px;padding:10px 13px}
.tutor .say{font-size:20px;font-weight:600;color:#fff;margin-bottom:3px}
.you{margin-left:auto;text-align:right}
.you .b{display:inline-block;background:#2b6cb0;border-radius:14px 14px 4px 14px;padding:8px 13px}
.tag{font-size:11px;color:#6b7280;margin-top:3px}
.ok{color:#51cf66}.no{color:#ffa94d}
.play{background:none;border:1px solid #3a4150;color:#9aa3ad;border-radius:8px;
 font-size:12px;padding:3px 9px;margin-top:6px;cursor:pointer}
footer{padding:14px;background:#15181d;border-top:1px solid #262a30;text-align:center}
#mic{width:84px;height:84px;border-radius:50%;border:none;font-size:30px;color:#fff;
 background:#2b6cb0;transition:.15s;cursor:pointer}
#mic.rec{background:#e03131;transform:scale(1.08);box-shadow:0 0 0 6px rgba(224,49,49,.25)}
#mic:disabled{background:#3a4150}
#hint{font-size:12px;color:#8a929c;margin-top:8px;min-height:16px}
#langsel{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.lang{background:#1b2330;border:1px solid #29384d;color:#cbd3dc;border-radius:18px;padding:6px 14px;font-size:13px;cursor:pointer}
.lang.active{background:#2b6cb0;color:#fff;border-color:#2b6cb0}
#levelsel{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.lvl{background:#1b2330;border:1px solid #29384d;color:#cbd3dc;border-radius:18px;padding:5px 11px;font-size:12px;cursor:pointer}
.lvl.active{background:#2b6cb0;color:#fff;border-color:#2b6cb0}
.box table td{padding:4px 6px;border-bottom:1px solid #1c2027}
#pk{width:100%;max-width:340px;background:#1b2330;border:1px solid #29384d;color:#e9edf2;border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:10px;text-align:center}
#tools{margin-top:12px;font-size:12px;color:#8a929c}
#tools a{color:#6aa3e0;cursor:pointer}
#panel{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:9}
.box{background:#15181d;border:1px solid #2a2f37;border-radius:14px;padding:18px;max-width:420px;width:100%;max-height:88dvh;overflow:auto}
.box h3{margin:0 0 6px;font-size:15px}
.box .note{color:#8a929c;font-size:12px;margin-bottom:8px}
.box textarea{width:100%;height:86px;background:#0d0f12;color:#cbd3dc;border:1px solid #29384d;border-radius:8px;font:12px ui-monospace,monospace;padding:8px;word-break:break-all}
.box .qr{background:#fff;border-radius:10px;padding:10px;margin:10px 0;display:flex;justify-content:center}
.box .qr svg{width:210px;height:210px}
.box button{background:#2b6cb0;color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:14px;cursor:pointer;margin:6px 8px 0 0}
.box .sec{background:none;border:1px solid #3a4150;color:#9aa3ad}
</style></head><body>
<header><h1>🗣️ loqui <span style="color:#8a929c;font-weight:400">— voice tutor</span></h1>
<div class="prog" id="prog">pick a language &amp; start</div></header>
<div id="log"></div>
<footer>
<input id="pk" placeholder="passkey — optional, resumes your progress" autocomplete="off">
<div id="langsel">
<button class="lang active" data-l="pt">🇧🇷 Português</button>
<button class="lang" data-l="ru">🇷🇺 Русский</button>
</div>
<div id="levelsel">
<button class="lvl active" data-n="0">🌱 beginner</button>
<button class="lvl" data-n="40">📗 some basics</button>
<button class="lvl" data-n="100">📘 intermediate</button>
</div>
<button id="mic" disabled>🎤</button>
<div id="hint">pick a language, then start</div>
<button id="start" class="play" style="margin-top:10px">▶ start</button>
<div id="tools"><a id="saveBtn">💾 save code</a> &nbsp;·&nbsp; <a id="resumeBtn">📥 resume</a> &nbsp;·&nbsp; <a id="statusBtn">📊 progress</a></div>
</footer>
<div id="panel"><div class="box" id="box"></div></div>
<audio id="player"></audio>
<script>
const log=document.getElementById('log'),player=document.getElementById('player'),
 mic=document.getElementById('mic'),hint=document.getElementById('hint'),
 prog=document.getElementById('prog'),startBtn=document.getElementById('start'),
 pk=document.getElementById('pk'),panel=document.getElementById('panel'),box=document.getElementById('box');
pk.value=localStorage.getItem('loqui_pk')||'';
pk.onchange=function(){localStorage.setItem('loqui_pk',pk.value.trim());};
let rec,chunks=[],busy=false,unlocked=false,lang='pt',level=0;
window.addEventListener('error',function(e){if(hint)hint.textContent='⚠ '+e.message;});
function add(html,cls){const d=document.createElement('div');d.className='msg '+cls;
 d.innerHTML=html;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function play(url){if(!url)return;player.src=url;player.play().catch(()=>{});}
function showTutor(d){
 let h='';if(d.say)h+='<div class="say">'+esc(d.say)+'</div>';
 h+='<div class="disp">'+esc(d.display||'')+'</div>';
 if(d.audio)h+='<button class="play">🔊 again</button>';
 if(d.timing){const t=d.timing;let s=[];
  if(t.stt_ms)s.push('heard '+(t.stt_ms/1000).toFixed(1)+'s');
  if(t.realize_ms)s.push('brain '+(t.realize_ms/1000).toFixed(1)+'s'+(t.via&&t.via!=='ollama'?' ('+t.via+')':''));
  if(t.tts_ms)s.push('voice '+(t.tts_ms/1000).toFixed(1)+'s');
  if(s.length)h+='<div class="tag">⏱ '+s.join(' · ')+'</div>';}
 const el=add(h,'tutor');
 if(d.audio){const b=el.querySelector('.play');if(b)b.onclick=function(){play(d.audio);};}
 play(d.audio);
 prog.textContent=d.progress?((d.progress.language?d.progress.language+'  ·  ':'')+'words: '+d.progress.introduced+'/'+d.progress.of+
   '  ·  speaking: '+d.progress.production):'';
}
async function start(){
 startBtn.style.display='none';unlocked=true;
 try{player.play().catch(function(){});}catch(e){}   // unlock audio, never block on it
 hint.textContent='thinking…';
 try{
  const r=await fetch('/start?lang='+lang+'&level='+level+'&passkey='+encodeURIComponent(pk.value.trim()),{method:'POST'});
  showTutor(await r.json());
  mic.disabled=false;hint.textContent='tap 🎤 and speak';
 }catch(e){hint.textContent='start failed: '+e.message;startBtn.style.display='';}
}
async function send(blob){
 busy=true;mic.disabled=true;hint.textContent='🤔 listening + thinking…';
 const r=await fetch('/turn',{method:'POST',body:blob});
 const d=await r.json();
 if(d.transcript!==undefined){
  let tag=d.you_were?('<div class="tag '+(d.you_were=='correct'?'ok':'no')+'">'+d.you_were+'</div>'):'';
  add('<div class="b">'+esc(d.transcript||'…')+'</div>'+tag,'you');
 }
 showTutor(d);busy=false;mic.disabled=false;hint.textContent='tap 🎤 and speak';
}
async function toggle(){
 if(busy)return;
 if(rec&&rec.state==='recording'){rec.stop();mic.classList.remove('rec');hint.textContent='…';return;}
 try{player.pause();}catch(e){}   // stop tutor audio so the mic can't echo it back
 try{const s=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
  rec=new MediaRecorder(s);chunks=[];
  rec.ondataavailable=e=>chunks.push(e.data);
  rec.onstop=()=>{send(new Blob(chunks));s.getTracks().forEach(t=>t.stop());};
  rec.start();mic.classList.add('rec');hint.textContent='● recording — tap to send';
 }catch(e){hint.textContent='mic blocked — allow microphone access';}
}
function closePanel(){panel.style.display='none';box.innerHTML='';}
panel.onclick=function(e){if(e.target===panel)closePanel();};
async function saveCode(){
 panel.style.display='flex';box.innerHTML='<h3>💾 Your progress code</h3><div class="note">…</div>';
 try{const d=await (await fetch('/export',{method:'POST'})).json();
  let h='<h3>💾 Your progress code</h3><div class="note">Keep this to resume on any device — scan the QR or copy the text.</div>';
  h+=(d.qr?'<div class="qr">'+d.qr+'</div>':'<div class="note">'+d.items+' words learned — code is long, so no QR; use the text.</div>');
  h+='<textarea id="codeT" readonly>'+esc(d.code)+'</textarea>';
  h+='<div><button id="copyB">copy</button><button class="sec" onclick="closePanel()">close</button></div>';
  box.innerHTML=h;
  document.getElementById('copyB').onclick=function(){const t=document.getElementById('codeT');t.select();try{navigator.clipboard.writeText(t.value);}catch(e){document.execCommand('copy');}this.textContent='copied ✓';};
 }catch(e){box.innerHTML='<h3>error</h3><div class="note">'+esc(e.message)+'</div><button class="sec" onclick="closePanel()">close</button>';}
}
function resumePanel(){
 panel.style.display='flex';
 box.innerHTML='<h3>📥 Resume from a code</h3><textarea id="impT" placeholder="paste your loqui code"></textarea><div><button id="impB">resume</button><button class="sec" onclick="closePanel()">close</button></div>';
 document.getElementById('impB').onclick=async function(){
  const code=document.getElementById('impT').value.trim();if(!code)return;this.textContent='…';
  const d=await (await fetch('/import',{method:'POST',body:code})).json();
  if(d.error){this.textContent='resume';hint.textContent=d.error;document.getElementById('impT').style.borderColor='#e03131';return;}
  closePanel();startBtn.style.display='none';unlocked=true;try{player.play().catch(function(){});}catch(e){}
  showTutor(d);mic.disabled=false;hint.textContent='resumed — tap 🎤 and speak';
 };
}
async function statusPanel(){
 panel.style.display='flex';box.innerHTML='<h3>📊 Progress</h3><div class="note">…</div>';
 try{const d=await (await fetch('/status',{method:'POST'})).json();
  let h='<h3>📊 Progress — '+esc(d.language)+'</h3>';
  h+='<div class="note">'+d.introduced+' / '+d.of+' words seen · '+d.production_known+' you can produce · '+d.due+' due for review</div>';
  if(d.words.length){h+='<table style="width:100%;border-collapse:collapse;font-size:12.5px">';
   for(const w of d.words.slice(0,80)){const c=w.production?'#51cf66':(w.due?'#ffa94d':'#6b7280');
    h+='<tr><td>'+esc(w.lemma)+'</td><td style="color:#8a929c">'+esc(w.gloss)+'</td><td style="text-align:right;color:'+c+'">'+(w.production?'✓ produce':(w.due?'due':esc(w.state)))+'</td></tr>';}
   h+='</table>';}else{h+='<div class="note">No words yet — tap start and learn a few!</div>';}
  h+='<div><button class="sec" onclick="closePanel()">close</button></div>';box.innerHTML=h;
 }catch(e){box.innerHTML='<h3>error</h3><div class="note">'+esc(e.message)+'</div><button class="sec" onclick="closePanel()">close</button>';}
}
document.getElementById('saveBtn').onclick=saveCode;
document.getElementById('resumeBtn').onclick=resumePanel;
document.getElementById('statusBtn').onclick=statusPanel;
document.querySelectorAll('.lvl').forEach(function(b){b.onclick=function(){level=+b.dataset.n;document.querySelectorAll('.lvl').forEach(x=>x.classList.remove('active'));b.classList.add('active');};});
document.querySelectorAll('.lang').forEach(function(b){b.onclick=function(){lang=b.dataset.l;document.querySelectorAll('.lang').forEach(x=>x.classList.remove('active'));b.classList.add('active');};});
startBtn.onclick=start;mic.onclick=toggle;
</script></body></html>
